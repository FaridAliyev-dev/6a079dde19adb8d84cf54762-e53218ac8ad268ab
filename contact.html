  <section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding-top: 100px;">
    <div class="container" style="width: 100%;">
      <h2 class="section-title text-center">Get In Touch</h2>
      <p class="section-desc text-center max-w-md">Have questions? Fill out the form below and our team will get back to you shortly.</p>
      
      <div class="max-w-md glass" style="padding: 2.5rem; margin: 0 auto; border-radius: 16px;">
        <form style="display: flex; flex-direction: column; gap: 1.5rem;">
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-weight: 500; font-size: 0.95rem;">Name</label>
            <input type="text" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.5); outline: none;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-weight: 500; font-size: 0.95rem;">Email</label>
            <input type="email" required style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.5); outline: none;">
          </div>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label style="font-weight: 500; font-size: 0.95rem;">Message</label>
            <textarea required rows="5" style="padding: 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.5); font-family: inherit; resize: vertical; outline: none;"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; border: none; padding: 1rem; font-size: 1rem; margin-top: 0.5rem;">Send Message</button>
        </form>
